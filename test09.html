<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test 09 - Geometric Topology</title>

  <style>
    body {
      background: #030305;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    pxl-stage {
      width: 100%;
      max-width: 1200px;
      border: 1px solid #222;
      background: #050508;
      border-radius: 12px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    }
  </style>
</head>
<body>

  <h2>Topology Engine (Smoothing, Dashing, Closing)</h2>

  <pxl-stage id="main" ratio="16 / 9">
    
    <!-- BACKGROUND: 10 Dashed Lines (Marching Ants) -->
    <pxl-layer>
      <pxl-group x="500" y="281">
        <!-- Sunburst lines radiating outward -->
        <pxl-line x1="0" y1="0" x2="-600" y2="-300" strokewidth="2" stroke="linear([1,1, 0,0], ['transparent', '#ff0055'])" linedash="[15, 15]" dashoffset="t * -100"></pxl-line>
        <pxl-line x1="0" y1="0" x2="-300" y2="-400" strokewidth="2" stroke="linear([1,1, 0,0], ['transparent', '#ff0055'])" linedash="[10, 20]" dashoffset="t * -80"></pxl-line>
        <pxl-line x1="0" y1="0" x2="0" y2="-400" strokewidth="2" stroke="linear([0.5,1, 0.5,0], ['transparent', '#a200ff'])" linedash="[5, 10]" dashoffset="t * -120"></pxl-line>
        <pxl-line x1="0" y1="0" x2="300" y2="-400" strokewidth="2" stroke="linear([0,1, 1,0], ['transparent', '#00f2ff'])" linedash="[10, 20]" dashoffset="t * -80"></pxl-line>
        <pxl-line x1="0" y1="0" x2="600" y2="-300" strokewidth="2" stroke="linear([0,1, 1,0], ['transparent', '#00f2ff'])" linedash="[15, 15]" dashoffset="t * -100"></pxl-line>
        
        <pxl-line x1="0" y1="0" x2="-600" y2="300" strokewidth="2" stroke="linear([1,0, 0,1], ['transparent', '#ff0055'])" linedash="[15, 15]" dashoffset="t * -100"></pxl-line>
        <pxl-line x1="0" y1="0" x2="-300" y2="400" strokewidth="2" stroke="linear([1,0, 0,1], ['transparent', '#ff0055'])" linedash="[10, 20]" dashoffset="t * -80"></pxl-line>
        <pxl-line x1="0" y1="0" x2="0" y2="400" strokewidth="2" stroke="linear([0.5,0, 0.5,1], ['transparent', '#a200ff'])" linedash="[5, 10]" dashoffset="t * -120"></pxl-line>
        <pxl-line x1="0" y1="0" x2="300" y2="400" strokewidth="2" stroke="linear([0,0, 1,1], ['transparent', '#00f2ff'])" linedash="[10, 20]" dashoffset="t * -80"></pxl-line>
        <pxl-line x1="0" y1="0" x2="600" y2="300" strokewidth="2" stroke="linear([0,0, 1,1], ['transparent', '#00f2ff'])" linedash="[15, 15]" dashoffset="t * -100"></pxl-line>
      </pxl-group>
    </pxl-layer>

    <!-- FOREGROUND: Organic Polylines -->
    <pxl-layer>
      <pxl-text x="20" y="30" text="ref.main.fps + ' FPS | AVG: ' + ref.main.renderAvg + 'ms | MAX: ' + ref.main.renderMax + 'ms'" font="monospace" size="14" fill="#0f0"></pxl-text>

      <!-- 1. LEFT SIDE: 5 Concentric Pulsing Closed Smooth Blobs -->
      <pxl-group x="250" y="281">
        <!-- Outer Blob -->
        <pxl-polyline closed="true" smooth="true" 
          stroke="linear([-1,-1,1,1], ['#00f2ff', '#ff0055'])" strokewidth="6" fill="rgba(0,0,0,0.5)"
          points="
            -150 - wave(2.1)*30, 0; 
            -75, -150 - wave(2.5)*40; 
            75, -150 - wave(2.8)*30; 
            150 + wave(3.2)*40, 0; 
            75, 150 + wave(2.3)*50; 
            -75, 150 + wave(2.7)*30
          "></pxl-polyline>

        <!-- Inner Blob 1 -->
        <pxl-polyline closed="true" smooth="0.8" 
          stroke="#a200ff" strokewidth="4" linedash="[10, 15]" dashoffset="t * 50"
          points="
            -110 - wave(3.1)*20, 0; 
            -55, -110 - wave(2.2)*20; 
            55, -110 - wave(3.5)*20; 
            110 + wave(2.8)*20, 0; 
            55, 110 + wave(3.4)*20; 
            -55, 110 + wave(2.6)*20
          "></pxl-polyline>

        <!-- Inner Blob 2 -->
        <pxl-polyline closed="true" smooth="1.2" 
          stroke="#00f2ff" strokewidth="3"
          points="
            -70 - wave(1.5)*15, 0; 
            -35, -70 - wave(1.8)*15; 
            35, -70 - wave(1.4)*15; 
            70 + wave(1.7)*15, 0; 
            35, 70 + wave(1.9)*15; 
            -35, 70 + wave(1.6)*15
          "></pxl-polyline>

        <!-- Inner Blob 3 (Jagged/Sharp!) -->
        <pxl-polyline closed="true" smooth="false" 
          stroke="#ff0055" strokewidth="2" linejoin="miter" miterlimit="2"
          points="
            -40 - wave(1.1)*10, 0; 
            -20, -40 - wave(1.3)*10; 
            20, -40 - wave(1.2)*10; 
            40 + wave(1.4)*10, 0; 
            20, 40 + wave(1.5)*10; 
            -20, 40 + wave(1.0)*10
          "></pxl-polyline>

        <!-- Core Pulse -->
        <pxl-circle r="15 + wave(0.5)*10" fill="#fff"></pxl-circle>
      </pxl-group>


      <!-- 2. RIGHT SIDE: 5 Unclosed "Squiggly" Paths with Linecaps -->
      <pxl-group x="750" y="281">
        <!-- Thick rounded squiggle -->
        <pxl-polyline closed="false" smooth="true" 
          stroke="linear([-1,0,1,0], ['#ff0055', '#a200ff', '#00f2ff'])" strokewidth="15" linecap="round"
          points="
            -150, -100 + wave(1)*50;
            -50, 100 - wave(1.2)*50;
            50, -100 + wave(1.4)*50;
            150, 100 - wave(1.6)*50
          "></pxl-polyline>

        <!-- Dashed snake moving through it -->
        <pxl-polyline closed="false" smooth="1.5" 
          stroke="#fff" strokewidth="4" linecap="round" linedash="[1, 15]" dashoffset="t * -100"
          points="
            -150, -100 + wave(1)*50;
            -50, 100 - wave(1.2)*50;
            50, -100 + wave(1.4)*50;
            150, 100 - wave(1.6)*50
          "></pxl-polyline>

        <!-- Loose floating string 1 -->
        <pxl-polyline closed="false" smooth="2" 
          stroke="rgba(0, 242, 255, 0.5)" strokewidth="3" linecap="square"
          points="
            -120, -150 + wave(2.1)*80;
            -20, 150 - wave(2.5)*80;
            80, -150 + wave(2.3)*80;
            120, 150 - wave(2.8)*80
          "></pxl-polyline>

        <!-- Loose floating string 2 -->
        <pxl-polyline closed="false" smooth="0.5" 
          stroke="rgba(255, 0, 85, 0.5)" strokewidth="2" linecap="butt" linedash="[5, 5]" dashoffset="t * 50"
          points="
            -180, 50 - wave(3.1)*100;
            -80, -50 + wave(3.5)*100;
            20, 50 - wave(3.3)*100;
            180, -50 + wave(3.8)*100
          "></pxl-polyline>

        <!-- Center intersecting zig-zag (Not smooth) -->
        <pxl-polyline closed="false" smooth="false" 
          stroke="rgba(162, 0, 255, 0.8)" strokewidth="4" linejoin="bevel"
          points="
            -150, 0;
            -75, wave(0.5)*80;
            0, 0;
            75, -wave(0.5)*80;
            150, 0
          "></pxl-polyline>

      </pxl-group>

    </pxl-layer>
  </pxl-stage>

  <script src="dist/pxl.min.js"></script>
</body>
</html>
