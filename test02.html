<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Particle Swarm</title>
    <link rel="stylesheet" href="css/styles.css" />
    <style>
      body {
        margin: 0;
        background-color: #020204;
        color: white;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .container {
        width: 90%;
        max-width: 1400px;
        box-shadow: 0 10px 80px rgba(0, 50, 150, 0.2);
        border: 1px solid #112;
        border-radius: 8px;
        overflow: hidden;
      }
      h1 { 
        margin-bottom: 30px; 
        font-weight: 300; 
        letter-spacing: 12px; 
        color: #fff; 
        text-align: center; 
        text-shadow: 0 0 20px rgba(0,255,255,0.5);
      }
    </style>
  </head>
  <body>
    <h1>BIOLUMINESCENCE</h1>
    <div class="container">
      <pxl-stage id="main" ratio="16 / 9">
        <pxl-layer fps="60">
          
          <!-- Background explicitly covers the entire stage perfectly -->
          <pxl-rect x="500" y="281" w="1000" h="562" fill="#020204"></pxl-rect>

          <!-- Core Ambient Glow -->
          <pxl-circle x="500" y="281" r="200 + wave(5) * 50" fill="hsla((t/15)%360, 100%, 50%, 0.03)" stroke="none"></pxl-circle>
          <pxl-circle x="500" y="281" r="100 + wave(3.5) * 30" fill="hsla((t/20)%360, 100%, 60%, 0.05)" stroke="none"></pxl-circle>

          <!-- Swarm 1 -->
          <pxl-group x="500" y="281" rotate="loop(10) * 360">
            <pxl-circle x="sin(t/1000)*100" y="cos(t/1150)*150" r="3 + wave(1)*3" fill="hsla((t/5 + 0)%360, 100%, 60%, 0.6 + wave(1.5)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/750)*250" y="cos(t/950)*200" r="4 + wave(1.5)*4" fill="hsla((t/7.5 + 0)%360, 100%, 60%, 0.6 + wave(1)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/1400)*350" y="cos(t/1050)*100" r="2 + wave(2)*2" fill="hsla((t/10 + 0)%360, 100%, 60%, 0.6 + wave(2)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/900)*400" y="cos(t/1250)*300" r="5 + wave(1)*5" fill="hsla((t/6 + 0)%360, 100%, 60%, 0.6 + wave(2.5)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/1500)*150" y="cos(t/1350)*400" r="3 + wave(2.5)*3" fill="hsla((t/9 + 0)%360, 100%, 60%, 0.6 + wave(1)*0.4)"></pxl-circle>
            <pxl-circle x="cos(t/1100)*300" y="sin(t/1300)*350" r="4 + wave(1.5)*4" fill="hsla((t/7 + 0)%360, 100%, 60%, 0.6 + wave(1.5)*0.4)"></pxl-circle>
            <pxl-circle x="cos(t/850)*450" y="sin(t/1000)*250" r="2 + wave(2)*2" fill="hsla((t/8 + 0)%360, 100%, 60%, 0.6 + wave(2)*0.4)"></pxl-circle>
            <pxl-circle x="cos(t/1450)*200" y="sin(t/1200)*100" r="5 + wave(1)*5" fill="hsla((t/5.5 + 0)%360, 100%, 60%, 0.6 + wave(1)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/1200)*350" y="sin(t/1400)*400" r="3 + wave(2.5)*3" fill="hsla((t/9.5 + 0)%360, 100%, 60%, 0.6 + wave(2.5)*0.4)"></pxl-circle>
            <pxl-circle x="cos(t/950)*100" y="sin(t/750)*50"  r="4 + wave(1)*4" fill="hsla((t/6.5 + 0)%360, 100%, 60%, 0.6 + wave(1.5)*0.4)"></pxl-circle>
          </pxl-group>

          <!-- Swarm 2 -->
          <pxl-group x="500" y="281" rotate="loop(7.5) * -360">
            <pxl-circle x="sin(t/1000)*100" y="cos(t/1150)*150" r="3 + wave(1)*3" fill="hsla((t/5 + 45)%360, 100%, 60%, 0.6 + wave(1.5)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/750)*250" y="cos(t/950)*200" r="4 + wave(1.5)*4" fill="hsla((t/7.5 + 45)%360, 100%, 60%, 0.6 + wave(1)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/1400)*350" y="cos(t/1050)*100" r="2 + wave(2)*2" fill="hsla((t/10 + 45)%360, 100%, 60%, 0.6 + wave(2)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/900)*400" y="cos(t/1250)*300" r="5 + wave(1)*5" fill="hsla((t/6 + 45)%360, 100%, 60%, 0.6 + wave(2.5)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/1500)*150" y="cos(t/1350)*400" r="3 + wave(2.5)*3" fill="hsla((t/9 + 45)%360, 100%, 60%, 0.6 + wave(1)*0.4)"></pxl-circle>
            <pxl-circle x="cos(t/1100)*300" y="sin(t/1300)*350" r="4 + wave(1.5)*4" fill="hsla((t/7 + 45)%360, 100%, 60%, 0.6 + wave(1.5)*0.4)"></pxl-circle>
            <pxl-circle x="cos(t/850)*450" y="sin(t/1000)*250" r="2 + wave(2)*2" fill="hsla((t/8 + 45)%360, 100%, 60%, 0.6 + wave(2)*0.4)"></pxl-circle>
            <pxl-circle x="cos(t/1450)*200" y="sin(t/1200)*100" r="5 + wave(1)*5" fill="hsla((t/5.5 + 45)%360, 100%, 60%, 0.6 + wave(1)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/1200)*350" y="sin(t/1400)*400" r="3 + wave(2.5)*3" fill="hsla((t/9.5 + 45)%360, 100%, 60%, 0.6 + wave(2.5)*0.4)"></pxl-circle>
            <pxl-circle x="cos(t/950)*100" y="sin(t/750)*50"  r="4 + wave(1)*4" fill="hsla((t/6.5 + 45)%360, 100%, 60%, 0.6 + wave(1.5)*0.4)"></pxl-circle>
          </pxl-group>

          <!-- Swarm 3 -->
          <pxl-group x="500" y="281" rotate="loop(12.5) * 360">
            <pxl-circle x="sin(t/1000)*100" y="cos(t/1150)*150" r="3 + wave(1)*3" fill="hsla((t/5 + 90)%360, 100%, 60%, 0.6 + wave(1.5)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/750)*250" y="cos(t/950)*200" r="4 + wave(1.5)*4" fill="hsla((t/7.5 + 90)%360, 100%, 60%, 0.6 + wave(1)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/1400)*350" y="cos(t/1050)*100" r="2 + wave(2)*2" fill="hsla((t/10 + 90)%360, 100%, 60%, 0.6 + wave(2)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/900)*400" y="cos(t/1250)*300" r="5 + wave(1)*5" fill="hsla((t/6 + 90)%360, 100%, 60%, 0.6 + wave(2.5)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/1500)*150" y="cos(t/1350)*400" r="3 + wave(2.5)*3" fill="hsla((t/9 + 90)%360, 100%, 60%, 0.6 + wave(1)*0.4)"></pxl-circle>
            <pxl-circle x="cos(t/1100)*300" y="sin(t/1300)*350" r="4 + wave(1.5)*4" fill="hsla((t/7 + 90)%360, 100%, 60%, 0.6 + wave(1.5)*0.4)"></pxl-circle>
            <pxl-circle x="cos(t/850)*450" y="sin(t/1000)*250" r="2 + wave(2)*2" fill="hsla((t/8 + 90)%360, 100%, 60%, 0.6 + wave(2)*0.4)"></pxl-circle>
            <pxl-circle x="cos(t/1450)*200" y="sin(t/1200)*100" r="5 + wave(1)*5" fill="hsla((t/5.5 + 90)%360, 100%, 60%, 0.6 + wave(1)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/1200)*350" y="sin(t/1400)*400" r="3 + wave(2.5)*3" fill="hsla((t/9.5 + 90)%360, 100%, 60%, 0.6 + wave(2.5)*0.4)"></pxl-circle>
            <pxl-circle x="cos(t/950)*100" y="sin(t/750)*50"  r="4 + wave(1)*4" fill="hsla((t/6.5 + 90)%360, 100%, 60%, 0.6 + wave(1.5)*0.4)"></pxl-circle>
          </pxl-group>

          <!-- Swarm 4 -->
          <pxl-group x="500" y="281" rotate="loop(9) * -360">
            <pxl-circle x="sin(t/1000)*100" y="cos(t/1150)*150" r="3 + wave(1)*3" fill="hsla((t/5 + 135)%360, 100%, 60%, 0.6 + wave(1.5)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/750)*250" y="cos(t/950)*200" r="4 + wave(1.5)*4" fill="hsla((t/7.5 + 135)%360, 100%, 60%, 0.6 + wave(1)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/1400)*350" y="cos(t/1050)*100" r="2 + wave(2)*2" fill="hsla((t/10 + 135)%360, 100%, 60%, 0.6 + wave(2)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/900)*400" y="cos(t/1250)*300" r="5 + wave(1)*5" fill="hsla((t/6 + 135)%360, 100%, 60%, 0.6 + wave(2.5)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/1500)*150" y="cos(t/1350)*400" r="3 + wave(2.5)*3" fill="hsla((t/9 + 135)%360, 100%, 60%, 0.6 + wave(1)*0.4)"></pxl-circle>
            <pxl-circle x="cos(t/1100)*300" y="sin(t/1300)*350" r="4 + wave(1.5)*4" fill="hsla((t/7 + 135)%360, 100%, 60%, 0.6 + wave(1.5)*0.4)"></pxl-circle>
            <pxl-circle x="cos(t/850)*450" y="sin(t/1000)*250" r="2 + wave(2)*2" fill="hsla((t/8 + 135)%360, 100%, 60%, 0.6 + wave(2)*0.4)"></pxl-circle>
            <pxl-circle x="cos(t/1450)*200" y="sin(t/1200)*100" r="5 + wave(1)*5" fill="hsla((t/5.5 + 135)%360, 100%, 60%, 0.6 + wave(1)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/1200)*350" y="sin(t/1400)*400" r="3 + wave(2.5)*3" fill="hsla((t/9.5 + 135)%360, 100%, 60%, 0.6 + wave(2.5)*0.4)"></pxl-circle>
            <pxl-circle x="cos(t/950)*100" y="sin(t/750)*50"  r="4 + wave(1)*4" fill="hsla((t/6.5 + 135)%360, 100%, 60%, 0.6 + wave(1.5)*0.4)"></pxl-circle>
          </pxl-group>

          <!-- Swarm 5 -->
          <pxl-group x="500" y="281" rotate="loop(11) * 360">
            <pxl-circle x="sin(t/1000)*100" y="cos(t/1150)*150" r="3 + wave(1)*3" fill="hsla((t/5 + 180)%360, 100%, 60%, 0.6 + wave(1.5)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/750)*250" y="cos(t/950)*200" r="4 + wave(1.5)*4" fill="hsla((t/7.5 + 180)%360, 100%, 60%, 0.6 + wave(1)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/1400)*350" y="cos(t/1050)*100" r="2 + wave(2)*2" fill="hsla((t/10 + 180)%360, 100%, 60%, 0.6 + wave(2)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/900)*400" y="cos(t/1250)*300" r="5 + wave(1)*5" fill="hsla((t/6 + 180)%360, 100%, 60%, 0.6 + wave(2.5)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/1500)*150" y="cos(t/1350)*400" r="3 + wave(2.5)*3" fill="hsla((t/9 + 180)%360, 100%, 60%, 0.6 + wave(1)*0.4)"></pxl-circle>
            <pxl-circle x="cos(t/1100)*300" y="sin(t/1300)*350" r="4 + wave(1.5)*4" fill="hsla((t/7 + 180)%360, 100%, 60%, 0.6 + wave(1.5)*0.4)"></pxl-circle>
            <pxl-circle x="cos(t/850)*450" y="sin(t/1000)*250" r="2 + wave(2)*2" fill="hsla((t/8 + 180)%360, 100%, 60%, 0.6 + wave(2)*0.4)"></pxl-circle>
            <pxl-circle x="cos(t/1450)*200" y="sin(t/1200)*100" r="5 + wave(1)*5" fill="hsla((t/5.5 + 180)%360, 100%, 60%, 0.6 + wave(1)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/1200)*350" y="sin(t/1400)*400" r="3 + wave(2.5)*3" fill="hsla((t/9.5 + 180)%360, 100%, 60%, 0.6 + wave(2.5)*0.4)"></pxl-circle>
            <pxl-circle x="cos(t/950)*100" y="sin(t/750)*50"  r="4 + wave(1)*4" fill="hsla((t/6.5 + 180)%360, 100%, 60%, 0.6 + wave(1.5)*0.4)"></pxl-circle>
          </pxl-group>

          <!-- Swarm 6 -->
          <pxl-group x="500" y="281" rotate="loop(6) * -360">
            <pxl-circle x="sin(t/1000)*100" y="cos(t/1150)*150" r="3 + wave(1)*3" fill="hsla((t/5 + 225)%360, 100%, 60%, 0.6 + wave(1.5)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/750)*250" y="cos(t/950)*200" r="4 + wave(1.5)*4" fill="hsla((t/7.5 + 225)%360, 100%, 60%, 0.6 + wave(1)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/1400)*350" y="cos(t/1050)*100" r="2 + wave(2)*2" fill="hsla((t/10 + 225)%360, 100%, 60%, 0.6 + wave(2)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/900)*400" y="cos(t/1250)*300" r="5 + wave(1)*5" fill="hsla((t/6 + 225)%360, 100%, 60%, 0.6 + wave(2.5)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/1500)*100" y="cos(t/1350)*200" r="3 + wave(2.5)*3" fill="hsla((t/9 + 225)%360, 100%, 60%, 0.6 + wave(1)*0.4)"></pxl-circle>
            <pxl-circle x="cos(t/1100)*300" y="sin(t/1300)*350" r="4 + wave(1.5)*4" fill="hsla((t/7 + 225)%360, 100%, 60%, 0.6 + wave(1.5)*0.4)"></pxl-circle>
            <pxl-circle x="cos(t/850)*450" y="sin(t/1000)*250" r="2 + wave(2)*2" fill="hsla((t/8 + 225)%360, 100%, 60%, 0.6 + wave(2)*0.4)"></pxl-circle>
            <pxl-circle x="cos(t/1450)*200" y="sin(t/1200)*100" r="5 + wave(1)*5" fill="hsla((t/5.5 + 225)%360, 100%, 60%, 0.6 + wave(1)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/1200)*350" y="sin(t/1400)*400" r="3 + wave(2.5)*3" fill="hsla((t/9.5 + 225)%360, 100%, 60%, 0.6 + wave(2.5)*0.4)"></pxl-circle>
            <pxl-circle x="cos(t/950)*100" y="sin(t/750)*50"  r="4 + wave(1)*4" fill="hsla((t/6.5 + 225)%360, 100%, 60%, 0.6 + wave(1.5)*0.4)"></pxl-circle>
          </pxl-group>

          <!-- Swarm 7 -->
          <pxl-group x="500" y="281" rotate="loop(15) * 360">
            <pxl-circle x="sin(t/1000)*100" y="cos(t/1150)*150" r="3 + wave(1)*3" fill="hsla((t/5 + 270)%360, 100%, 60%, 0.6 + wave(1.5)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/750)*250" y="cos(t/950)*200" r="4 + wave(1.5)*4" fill="hsla((t/7.5 + 270)%360, 100%, 60%, 0.6 + wave(1)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/1400)*350" y="cos(t/1050)*100" r="2 + wave(2)*2" fill="hsla((t/10 + 270)%360, 100%, 60%, 0.6 + wave(2)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/900)*400" y="cos(t/1250)*300" r="5 + wave(1)*5" fill="hsla((t/6 + 270)%360, 100%, 60%, 0.6 + wave(2.5)*0.4)"></pxl-circle>
            <pxl-circle x="sin(t/1500)*150" y="cos(t/1350)*400" r="3 + wave(2.5)*3" fill="hsla((t/9 + 270)%360, 100%, 60%, 0.6 + wave(1)*0.4)"></pxl-circle>
            <pxl-circle x="cos(t/1100)*300" y="sin(t/1300)*350" r="4 + wave(1.5)*4" fill="hsla((t/7 + 270)%360, 100%, 60%, 0.6 + wave(1.5)*0.4)"></pxl-circle>
            <pxl-circle x="cos(t/850)*450" y="sin(t/1000)*250" r="2 + wave(2)*2" fill="hsla((t/8 + 270)%360, 100%, 60%, 0.6 + wave(2)*0.4)"></pxl-circle>

            <pxl-circle x="cos(t/1100)*300" y="sin(t/1300)*350" r="4 + wave(1.5)*4" fill="hsla((t/7 + 315)%360, 100%, 60%, 0.6 + wave(1.5)*0.4)"></pxl-circle>

    <script src="dist/pxl.min.js"></script>
  </body>
</html>
